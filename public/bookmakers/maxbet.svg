<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" role="img" aria-label="Maxbet">
  <!-- Green rounded square background, matching Maxbet's current brand colour -->
  <rect width="300" height="300" rx="40" fill="#0a5d2a"/>

  <!-- Subtle inner darker tint for depth -->
  <rect x="6" y="6" width="288" height="288" rx="34" fill="none" stroke="#073f1c" stroke-width="2"/>

  <!-- Crown above the M -->
  <g fill="#ffffff" transform="translate(150 80)">
    <path d="M -38 0 L -28 -28 L -14 -10 L 0 -36 L 14 -10 L 28 -28 L 38 0 Z" />
    <rect x="-42" y="2" width="84" height="10" rx="2"/>
    <circle cx="-28" cy="-30" r="3"/>
    <circle cx="0" cy="-38" r="3"/>
    <circle cx="28" cy="-30" r="3"/>
  </g>

  <!-- Stylised "m" letterform — large, bold, rounded -->
  <text x="150" y="220"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="900"
        font-size="160"
        font-style="italic"
        fill="#ffffff">m</text>

  <!-- Laurel wreaths flanking the M -->
  <g fill="#ffffff" opacity="0.92">
    <!-- Left laurel -->
    <g transform="translate(48 220)">
      <path d="M 0 0 Q 12 -30 6 -60" stroke="#ffffff" stroke-width="3" fill="none"/>
      <ellipse cx="2" cy="-12" rx="6" ry="3" transform="rotate(-30 2 -12)"/>
      <ellipse cx="6" cy="-26" rx="6" ry="3" transform="rotate(-20 6 -26)"/>
      <ellipse cx="9" cy="-40" rx="6" ry="3" transform="rotate(-10 9 -40)"/>
      <ellipse cx="9" cy="-54" rx="6" ry="3" transform="rotate(0 9 -54)"/>
    </g>
    <!-- Right laurel (mirrored) -->
    <g transform="translate(252 220) scale(-1 1)">
      <path d="M 0 0 Q 12 -30 6 -60" stroke="#ffffff" stroke-width="3" fill="none"/>
      <ellipse cx="2" cy="-12" rx="6" ry="3" transform="rotate(-30 2 -12)"/>
      <ellipse cx="6" cy="-26" rx="6" ry="3" transform="rotate(-20 6 -26)"/>
      <ellipse cx="9" cy="-40" rx="6" ry="3" transform="rotate(-10 9 -40)"/>
      <ellipse cx="9" cy="-54" rx="6" ry="3" transform="rotate(0 9 -54)"/>
    </g>
  </g>

  <!-- "MAXBET" wordmark below -->
  <text x="150" y="262"
        text-anchor="middle"
        font-family="Arial Black, 'Helvetica Neue', sans-serif"
        font-weight="900"
        font-size="22"
        letter-spacing="3"
        fill="#ffffff">MAXBET</text>
</svg>
